<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Client Portal — Ember SEO</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --ember-bg: #0D0D1A;
            --ember-card: #1A1A2E;
            --ember-accent: #FF6B35;
            --ember-accent-glow: rgba(255, 107, 53, 0.3);
            --ember-text: #E8E8F0;
            --ember-muted: #8888AA;
            --ember-border: #2A2A40;
            --ember-success: #22c55e;
            --ember-danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--ember-bg);
            color: var(--ember-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ─── Login Screen ─── */
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-card {
            background: var(--ember-card);
            border: 1px solid var(--ember-border);
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
        }

        .login-logo {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .login-logo span { color: var(--ember-accent); }

        .logo-img {
            height: 32px;
            width: auto;
            vertical-align: middle;
            margin-right: 4px;
            border-radius: 4px;
        }

        .login-subtitle {
            color: var(--ember-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--ember-muted);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--ember-bg);
            border: 1px solid var(--ember-border);
            border-radius: 8px;
            color: var(--ember-text);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--ember-accent);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--ember-accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .login-btn:hover { transform: translateY(-1px); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .login-error {
            color: var(--ember-danger);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        .login-footer {
            margin-top: 24px;
            font-size: 12px;
            color: var(--ember-muted);
        }

        .login-footer a {
            color: var(--ember-accent);
            text-decoration: none;
        }

        /* ─── Dashboard ─── */
        .dashboard { display: none; width: 100%; }

        .dashboard.active { display: block; }
        .login-container.hidden { display: none; }

        .dash-header {
            background: var(--ember-card);
            border-bottom: 1px solid var(--ember-border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dash-logo {
            font-size: 20px;
            font-weight: 800;
        }

        .dash-logo span { color: var(--ember-accent); }

        .dash-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dash-user-name {
            font-size: 14px;
            color: var(--ember-muted);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--ember-border);
            color: var(--ember-muted);
            padding: 6px 14px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--ember-accent);
            color: var(--ember-accent);
        }

        .dash-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .dash-welcome {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .dash-welcome-sub {
            color: var(--ember-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Score Card */
        .score-card {
            background: var(--ember-card);
            border: 1px solid var(--ember-border);
            border-radius: 16px;
            padding: 32px;
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 24px;
        }

        .score-ring {
            position: relative;
            width: 160px;
            height: 160px;
            flex-shrink: 0;
        }

        .score-ring svg { transform: rotate(-90deg); }
        .score-ring .bg { fill: none; stroke: var(--ember-border); stroke-width: 8; }
        .score-ring .progress {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1.5s ease;
        }

        .score-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .score-number .number {
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
        }

        .score-number .label {
            font-size: 12px;
            color: var(--ember-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-info { flex: 1; }

        .score-grade {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 18px;
            color: #000;
            margin-bottom: 8px;
        }

        .score-change {
            font-size: 14px;
            margin-bottom: 16px;
        }

        .score-change .up { color: var(--ember-success); }
        .score-change .down { color: var(--ember-danger); }

        .score-meta {
            font-size: 13px;
            color: var(--ember-muted);
        }

        /* History Chart */
        .chart-card {
            background: var(--ember-card);
            border: 1px solid var(--ember-border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .chart-container {
            width: 100%;
            height: 250px;
            position: relative;
        }

        .chart-canvas {
            width: 100%;
            height: 100%;
        }

        /* Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* Issues / Fixed */
        .list-card {
            background: var(--ember-card);
            border: 1px solid var(--ember-border);
            border-radius: 16px;
            padding: 24px;
        }

        .list-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .list-count {
            font-size: 12px;
            background: var(--ember-bg);
            padding: 2px 8px;
            border-radius: 12px;
            color: var(--ember-muted);
        }

        .list-item {
            padding: 10px 12px;
            background: var(--ember-bg);
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .list-item .icon { font-size: 16px; }
        .list-item .text { flex: 1; }
        .list-item .severity {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            color: #000;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--ember-card);
            border: 1px solid var(--ember-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
        }

        .stat-label {
            font-size: 12px;
            color: var(--ember-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--ember-muted);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--ember-border);
            border-top-color: var(--ember-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .score-card { flex-direction: column; text-align: center; gap: 24px; }
            .grid-2 { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .dash-header { padding: 16px; }
        }

        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-container" id="loginContainer">

                        <circle class="bg" cx="60" cy="60" r="54"/>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ─── Config ───
const SUPABASE_URL = 'https://vuzaqdiesojwzptxssex.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1emFxZGllc29qd3pwdHhzc2V4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MzU0NTEsImV4cCI6MjA4ODUxMTQ1MX0.Z56T5RUKB5-BuhvgoI2ccOMYgsILAQxrr2KqmXC9C1U';

const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ─── Auth ───
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.textContent = '';

    const { data, error } = await _sb.auth.signInWithPassword({ email, password });

    if (error) {
        errEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
    }

    showDashboard(data.user);
}

async function handleLogout() {
    await _sb.auth.signOut();
    document.getElementById('loginContainer').classList.remove('hidden');
    document.getElementById('dashboard').classList.remove('active');
}

// ─── Check existing session ───
async function checkSession() {
    const { data: { session } } = await _sb.auth.getSession();
    if (session) {
        showDashboard(session.user);
    }
}

// ─── Dashboard ───
async function showDashboard(user) {
    document.getElementById('loginContainer').classList.add('hidden');
    document.getElementById('dashboard').classList.add('active');
    document.getElementById('userName').textContent = user.email;

    // Fetch client profile
    const { data: profile } = await _sb
        .from('clients')
        .select('*')
        .eq('user_id', user.id)
        .single();

    if (profile) {
        document.getElementById('dashWelcome').textContent = `Welcome back, ${profile.business_name || 'there'}`;
        document.getElementById('dashWelcomeSub').textContent = profile.website || 'Here\'s how your site is performing.';
    }

    // Fetch audit history
    const { data: audits } = await _sb
        .from('audits')
        .select('*')
        .eq('client_id', profile?.id)
        .order('created_at', { ascending: true });

    document.getElementById('dashLoading').style.display = 'none';
    document.getElementById('dashData').style.display = 'block';

    if (audits && audits.length > 0) {
        renderDashboard(audits, profile);
    } else {
        document.getElementById('dashData').innerHTML = `
            <div style="text-align:center; padding:60px; color:var(--ember-muted);">
                <div style="font-size:48px; margin-bottom:16px;">📊</div>
                <div style="font-size:18px; font-weight:600; margin-bottom:8px;">Your first audit is coming soon</div>
                <div>We're analyzing your site — check back shortly.</div>
            </div>`;
    }
}

// ─── Render ───
function renderDashboard(audits, profile) {
    const latest = audits[audits.length - 1];
    const first = audits[0];
    const prev = audits.length > 1 ? audits[audits.length - 2] : null;

    const score = latest.score;
    const change = prev ? score - prev.score : 0;
    const totalChange = score - first.score;

    // Grade
    const grade = getGrade(score);

    // Stats
    document.getElementById('statScore').textContent = score;
    document.getElementById('statScore').style.color = grade.color;

    const changeEl = document.getElementById('statChange');
    if (change > 0) {
        changeEl.textContent = `+${change}`;
        changeEl.style.color = 'var(--ember-success)';
    } else if (change < 0) {
        changeEl.textContent = `${change}`;
        changeEl.style.color = 'var(--ember-danger)';
    } else {
        changeEl.textContent = '—';
        changeEl.style.color = 'var(--ember-muted)';
    }

    const issues = latest.issues || [];
    const fixed = latest.fixed || [];
    document.getElementById('statIssues').textContent = issues.length;
    document.getElementById('statFixed').textContent = fixed.length;

    // Score ring
    const circumference = 2 * Math.PI * 54;
    const offset = circumference - (score / 100) * circumference;
    const progress = document.getElementById('scoreProgress');
    progress.style.stroke = grade.color;
    setTimeout(() => { progress.style.strokeDashoffset = offset; }, 100);

    document.getElementById('scoreValue').textContent = score;
    document.getElementById('scoreValue').style.color = grade.color;

    const gradeEl = document.getElementById('scoreGrade');
    gradeEl.textContent = `Grade: ${grade.letter} — ${grade.label}`;
    gradeEl.style.background = grade.color;

    // Change text
    const changeText = document.getElementById('scoreChange');
    if (audits.length > 1) {
        changeText.innerHTML = totalChange >= 0
            ? `<span class="up">↑ +${totalChange} points</span> since you started with Ember`
            : `<span class="down">↓ ${totalChange} points</span> since start`;
    }

    document.getElementById('scoreMeta').textContent =
        `Last updated: ${new Date(latest.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;

    // Content metrics
    const metrics = latest.metrics || {};
    document.getElementById('statBlogs').textContent = metrics.blog_posts || 0;
    document.getElementById('statBacklinks').textContent = metrics.backlinks || 0;
    document.getElementById('statPagesIndexed').textContent = metrics.pages_indexed || 0;
    document.getElementById('statCityPages').textContent = metrics.city_pages || 0;

    // Issues list
    const issueList = document.getElementById('issueList');
    issueList.innerHTML = '';
    issues.forEach(issue => {
        const sevColor = { critical: '#ef4444', high: '#f97316', medium: '#eab308' }[issue.severity] || '#eab308';
        issueList.innerHTML += `
            <div class="list-item">
                <span class="icon">⚠️</span>
                <span class="text">${issue.name}</span>
                <span class="severity" style="background:${sevColor};">${(issue.severity || 'med').toUpperCase()}</span>
            </div>`;
    });
    document.getElementById('issueCount').textContent = issues.length;

    // Fixed list
    const fixedListEl = document.getElementById('fixedList');
    fixedListEl.innerHTML = '';
    fixed.forEach(item => {
        fixedListEl.innerHTML += `
            <div class="list-item">
                <span class="icon">✅</span>
                <span class="text">${item.name}</span>
            </div>`;
    });
    document.getElementById('fixedCount').textContent = fixed.length;

    // Draw chart
    drawChart(audits);
}

function getGrade(score) {
    if (score >= 90) return { letter: 'A', color: '#22c55e', label: 'Excellent' };
    if (score >= 80) return { letter: 'B', color: '#84cc16', label: 'Good' };
    if (score >= 70) return { letter: 'C', color: '#eab308', label: 'Average' };
    if (score >= 60) return { letter: 'D', color: '#f97316', label: 'Below Average' };
    return { letter: 'F', color: '#ef4444', label: 'Needs Work' };
}

// ─── Chart (pure canvas, no library) ───
function drawChart(audits) {
    const canvas = document.getElementById('historyChart');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx.scale(dpr, dpr);

    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    const pad = { top: 20, right: 20, bottom: 40, left: 40 };
    const cw = w - pad.left - pad.right;
    const ch = h - pad.top - pad.bottom;

    // Clear
    ctx.clearRect(0, 0, w, h);

    if (audits.length < 2) {
        ctx.fillStyle = '#8888AA';
        ctx.font = '14px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Score history will appear after your next audit', w / 2, h / 2);
        return;
    }

    const scores = audits.map(a => a.score);
    const dates = audits.map(a => new Date(a.created_at));
    const minScore = Math.max(0, Math.min(...scores) - 10);
    const maxScore = Math.min(100, Math.max(...scores) + 10);

    // Grid lines
    ctx.strokeStyle = '#2A2A40';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = pad.top + (ch / 4) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(w - pad.right, y);
        ctx.stroke();

        const val = Math.round(maxScore - (maxScore - minScore) * (i / 4));
        ctx.fillStyle = '#8888AA';
        ctx.font = '11px Inter, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(val, pad.left - 8, y + 4);
    }

    // Date labels
    ctx.textAlign = 'center';
    ctx.fillStyle = '#8888AA';
    ctx.font = '11px Inter, sans-serif';
    audits.forEach((a, i) => {
        const x = pad.left + (cw / (audits.length - 1)) * i;
        const label = dates[i].toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        ctx.fillText(label, x, h - 8);
    });

    // Line
    const points = scores.map((s, i) => ({
        x: pad.left + (cw / (scores.length - 1)) * i,
        y: pad.top + ch - ((s - minScore) / (maxScore - minScore)) * ch,
    }));

    // Gradient fill
    const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
    gradient.addColorStop(0, 'rgba(255, 107, 53, 0.3)');
    gradient.addColorStop(1, 'rgba(255, 107, 53, 0.0)');

    ctx.beginPath();
    ctx.moveTo(points[0].x, pad.top + ch);
    points.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(points[points.length - 1].x, pad.top + ch);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();

    // Line stroke
    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = '#FF6B35';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.stroke();

    // Dots
    points.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#FF6B35';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#0D0D1A';
        ctx.fill();
    });
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    e.stopPropagation();
    handleLogin(e);
    return false;
});
checkSession();
